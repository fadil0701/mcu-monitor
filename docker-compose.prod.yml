# Override untuk production — gunakan:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  mysql:
    ports: !reset []

  app:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_DEBUG: "false"
      LOG_LEVEL: warning
    security_opt:
      - no-new-privileges:true

  queue:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true

  scheduler:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true
