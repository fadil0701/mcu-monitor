# Snippet nginx host — proxy path /mcuppkp/ ke Docker Monitoring MCU (:9002)
# Pasang SEBELUM location / { ... } pada nginx portal VM.
#
# Contoh:
#   include <MCU_ROOT>/deploy/nginx-mcuppkp-portal-snippet.conf;

location = /mcuppkp {
    return 301 $scheme://$host/mcuppkp/;
}

location /mcuppkp/ {
    proxy_pass http://127.0.0.1:9002/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /mcuppkp;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_read_timeout 300;
    proxy_redirect off;
}
